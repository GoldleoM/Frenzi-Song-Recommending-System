<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic DNA Recommender</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Spotify uses Circular, Apple uses San Francisco. We'll use modern replacements -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Dynamic Animated Background Gradients mimicking Apple Music -->
    <div class="gradient-bg">
        <div class="blob-c" id="blob1"></div>
        <div class="blob-c" id="blob2"></div>
        <div class="blob-c" id="blob3"></div>
        <div class="glass-overlay"></div>
    </div>

    <div class="app-container">
        
        <!-- Header / Search -->
        <header class="search-header">
            <h1 class="logo">Sonic<span>DNA</span></h1>
            <div class="search-box glass-panel">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search for a track..." />
                <button id="search-btn" class="icon-btn"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing audio fingerprint...</p>
            </div>

            <!-- Target Match Container -->
            <section id="match-section" class="hidden fade-in">
                <h2 class="section-title">Seed Track</h2>
                <div class="hero-card glass-panel">
                    <div class="hero-art">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div class="hero-info">
                        <h2 id="matched-song">Song Name</h2>
                        <p id="matched-artist">Artist Name</p>
                    </div>
                    <button class="play-btn" id="hero-play"><i class="fa-solid fa-play"></i></button>
                </div>
            </section>

            <!-- Recommendations Container -->
            <section id="recommendations-section" class="hidden slide-up">
                <h2 class="section-title">Recommended by Audio Similarity</h2>
                <div class="track-list" id="recommendation-list">
                    <!-- Tracks injected via JS -->
                </div>
            </section>

        </main>

        <!-- Hidden YouTube Player for Audio -->
        <div id="youtube-player-container"></div>
        
    </div>

    <!-- YouTube IFRAME API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/app.js"></script>
</body>
</html>
