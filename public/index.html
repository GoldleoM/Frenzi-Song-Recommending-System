<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Recommender UI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar glass">
            <h2>Recommendations</h2>
            <ul>
                <li><a href="#" class="active">Home</a></li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav glass">
                <input type="text" id="search-input" placeholder="What do you want to listen to?" />
                <button id="search-btn">Search</button>
            </header>
            
            <section class="results-area">
                <h1 class="gradient-text">Discover New Sounds</h1>
                <div id="loader" class="hidden">Finding your next favorite song...</div>
                
                <div class="cards-grid" id="recommendation-cards">
                    <!-- Cards injected via JS -->
                </div>
            </section>
        </main>
        
        <!-- Player -->
        <footer class="player glass">
            <div id="youtube-player-container">
                <!-- YouTube iframe goes here -->
            </div>
            <div class="now-playing-info">
                <h3 id="now-playing-title">Ready to Play</h3>
                <p id="now-playing-artist">Search for a track</p>
            </div>
        </footer>
    </div>
    
    <!-- YouTube IFRAME API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/app.js"></script>
</body>
</html>
